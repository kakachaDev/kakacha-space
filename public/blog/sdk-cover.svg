<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" font-family="monospace">
  <rect width="640" height="280" fill="#1f1912"/>
  <rect x="0.5" y="0.5" width="639" height="279" fill="none" stroke="#3a2f22"/>
  <!-- UI layer -->
  <rect x="70" y="34" width="500" height="52" rx="4" fill="none" stroke="#3a2f22" stroke-width="1.5"/>
  <text x="320" y="60" fill="#e8dfd0" font-size="14" text-anchor="middle">Vue-компоненты · Pinia</text>
  <text x="320" y="76" fill="#a89a82" font-size="11" text-anchor="middle">ничего не знают про транспорт</text>
  <!-- SDK layer -->
  <rect x="70" y="112" width="500" height="60" rx="4" fill="none" stroke="#c9a15a" stroke-width="2"/>
  <text x="320" y="138" fill="#c9a15a" font-size="15" text-anchor="middle">SDK · strict TypeScript</text>
  <text x="320" y="158" fill="#a89a82" font-size="11" text-anchor="middle">бизнес-логика · RxJS-потоки · менеджер переподключений · тесты</text>
