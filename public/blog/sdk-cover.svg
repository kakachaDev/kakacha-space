  <rect x="335" y="198" width="235" height="48" rx="4" fill="none" stroke="#8a1f1f" stroke-width="1.5"/>
  <text x="452" y="226" fill="#e8dfd0" font-size="13" text-anchor="middle">WebSocket (SignalR)</text>
  <!-- arrows -->
  <line x1="320" y1="86" x2="320" y2="110" stroke="#a89a82" stroke-width="1.5"/>
  <line x1="187" y1="172" x2="187" y2="196" stroke="#a89a82" stroke-width="1.5"/>
  <line x1="452" y1="172" x2="452" y2="196" stroke="#a89a82" stroke-width="1.5"/>
</svg>
